name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Network data integrity
        run: node tests/network.test.mjs

      - name: Puzzle sources agreement (today.json ↔ puzzle-lookup.json ↔ index.html)
        run: node tests/puzzle-sources.test.mjs
