name: Generate today.json

on:
  schedule:
    # Midnight UK time. Uses UTC+1 (BST) in summer, UTC (GMT) in winter.
    # Running at both 23:00 and 00:00 UTC covers both — only the midnight
    # run will produce the correct date for that day.
    - cron: '0 0 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild puzzle-lookup.json (90-day window — source of truth)
        run: node build-lookup.mjs

      - name: Generate today.json (reads from puzzle-lookup.json)
        run: node generate-today.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add today.json puzzle-lookup.json
          git diff --cached --quiet || git commit -m "chore: update today.json for $(date -u +%Y-%m-%d)"
          git push
